name: core-cloud-sync

# 每天台灣時間 06:00（= UTC 22:00 前一天）自動整理今天待辦，並把有時間的任務同步進 iCloud「daily」
# 行事曆——不需要本機 Mac 開機/登入，走 CalDAV 直連 iCloud。Reminders/Notes 不在這條路徑裡（見
# .claude/skills/sub-caldav-sync/SKILL.md 的原因說明），仍然要在本機手動跑 /core-daily-sync。
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  # runner 預設用 UTC，`date +%F` 若不校正時區，會在台灣時間 06:00（= UTC 22:00 前一天）
  # 跑出「前一天」的日期，導致 sub-daily-check 整理錯天的資料。強制用台灣時區讓所有
  # `date` 呼叫（包含 Claude Code 內部的 skill 執行與下面的 commit 步驟）都對齊。
  TZ: Asia/Taipei

jobs:
  cloud-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sub-caldav-sync dependencies
        working-directory: .claude/skills/sub-caldav-sync/scripts
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Trust workspace for Claude Code
        # 全新 runner 每次都要重新信任這個目錄，不然 .claude/settings.json 的 permissions.allow
        # 會被忽略、非互動環境又沒辦法跳出確認對話框讓人按「同意」，會卡死。
        run: |
          mkdir -p ~/.claude
          printf '{"projects": {"%s": {"hasTrustDialogAccepted": true}}}' "$GITHUB_WORKSPACE" > ~/.claude.json

      - name: Run core-cloud-sync
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APPLE_ID_EMAIL: ${{ secrets.APPLE_ID_EMAIL }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          claude -p "/core-cloud-sync" --permission-mode acceptEdits

      - name: Commit and push changes
        run: |
          git config user.name "core-cloud-sync bot"
          git config user.email "actions@users.noreply.github.com"
          git add daily-plan/ schedule/計劃總覽.md schedule/schedule-log.md schedule/.caldav-sync-state.json trash-can/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "core-cloud-sync: $(date +%F) 自動整理"
            git push
          else
            echo "沒有變動，不用 commit。"
          fi
